<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Santirma Property Solutions — Seattle</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Curated rental homes and creative housing solutions across Seattle. Concierge service for renters, honest stewardship for owners.">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="preconnect" href="https://images.unsplash.com">
<link rel="icon" href="assets/logo-mark-navy.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--color-cloud-white); scroll-behavior: smooth; }
  body.santirma {
    font-family: var(--font-body);
    color: var(--color-midnight-navy);
    overflow-x: hidden;
  }
  ::selection { background: rgba(212,175,55,0.4); }

  /* Scroll reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 800ms var(--ease-luxury), transform 800ms var(--ease-luxury); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal-fade { opacity: 0; transition: opacity 1200ms var(--ease-luxury); }
  .reveal-fade.in { opacity: 1; }

  /* Hero photo ken-burns */
  @keyframes hero-zoom { from { transform: scale(1.0); } to { transform: scale(1.08); } }

  /* Modal animation */
  @keyframes modal-in { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes modal-bg { from { opacity: 0; } to { opacity: 1; } }

  /* Buttons */
  .s-btn-primary {
    background: var(--color-prestige-gold); color: var(--color-midnight-navy);
    border: none; border-radius: 12px; padding: 18px 32px;
    font-family: var(--font-body); font-weight: 700; font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    transition: all 280ms var(--ease-luxury);
  }
  .s-btn-primary:hover { background: var(--color-gold-light); transform: translateY(-1px); box-shadow: 0 14px 40px rgba(212,175,55,0.32); }
  .s-btn-ghost {
    background: transparent; color: #F7F7F7;
    border: 1px solid rgba(247,247,247,0.45); border-radius: 12px; padding: 17px 31px;
    font-family: var(--font-body); font-weight: 700; font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    transition: all 280ms var(--ease-standard);
  }
  .s-btn-ghost:hover { background: rgba(247,247,247,0.08); border-color: rgba(247,247,247,0.85); }
  .s-btn-dark {
    background: var(--color-midnight-navy); color: var(--color-cloud-white);
    border: none; border-radius: 12px; padding: 16px 28px;
    font-family: var(--font-body); font-weight: 700; font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    transition: all 280ms var(--ease-luxury);
  }
  .s-btn-dark:hover { background: var(--color-prestige-gold); color: var(--color-midnight-navy); }
  .s-btn-outline {
    background: transparent; color: var(--color-midnight-navy);
    border: 1px solid var(--color-midnight-navy); border-radius: 12px; padding: 15px 27px;
    font-family: var(--font-body); font-weight: 700; font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    transition: all 280ms var(--ease-standard);
  }
  .s-btn-outline:hover { background: var(--color-midnight-navy); color: var(--color-cloud-white); }

  /* Link */
  .s-link {
    color: var(--color-midnight-navy); text-decoration: none;
    border-bottom: 1px solid var(--color-prestige-gold); padding-bottom: 2px;
    transition: color 200ms var(--ease-standard);
  }
  .s-link:hover { color: var(--color-prestige-gold); }

  /* Editorial section index */
  .index-mark {
    font-family: var(--font-display); font-style: italic; font-weight: 400;
    color: var(--color-prestige-gold); font-size: 22px;
    display: inline-flex; align-items: center; gap: 14px;
  }
  .index-mark::after { content: ""; width: 56px; height: 1px; background: var(--color-prestige-gold); opacity: 0.6; }

  /* Filter chip */
  .chip {
    background: transparent; border: 1px solid var(--color-stone-deep);
    color: var(--color-midnight-navy);
    padding: 10px 18px; border-radius: 999px;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 220ms var(--ease-standard); white-space: nowrap;
  }
  .chip:hover { border-color: var(--color-midnight-navy); }
  .chip.active { background: var(--color-midnight-navy); color: var(--color-cloud-white); border-color: var(--color-midnight-navy); }

  /* Form inputs */
  .s-input, .s-textarea, .s-select {
    width: 100%; padding: 16px 18px;
    background: var(--color-cloud-soft); color: var(--color-midnight-navy);
    border: 1px solid var(--color-stone-deep); border-radius: 10px;
    font-family: var(--font-body); font-size: 15px;
    transition: border-color 220ms var(--ease-standard), box-shadow 220ms var(--ease-standard);
    outline: none;
  }
  .s-input:focus, .s-textarea:focus, .s-select:focus { border-color: var(--color-midnight-navy); box-shadow: var(--shadow-focus); }
  .s-textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
  .s-label {
    display: block; font-size: 11px; font-weight: 600; letterSpacing: 0.18em;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--color-ink-muted); margin-bottom: 8px;
  }

  /* Modal scroll */
  .modal-scroll::-webkit-scrollbar { width: 6px; }
  .modal-scroll::-webkit-scrollbar-thumb { background: var(--color-stone-deep); border-radius: 3px; }

  /* Prose for legal pages */
  .legal-prose h2 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 28px; line-height: 1.3; margin: 56px 0 16px;
    color: var(--color-midnight-navy);
  }
  .legal-prose h3 {
    font-family: var(--font-body); font-weight: 600;
    font-size: 16px; letter-spacing: 0.06em; text-transform: uppercase;
    margin: 36px 0 12px; color: var(--color-midnight-navy);
  }
  .legal-prose p, .legal-prose li {
    font-size: 15px; line-height: 1.75;
    color: var(--color-ink-muted); margin: 0 0 14px;
  }
  .legal-prose ul { padding-left: 22px; margin: 0 0 18px; }
  .legal-prose li { margin-bottom: 8px; }
  .legal-prose strong { color: var(--color-midnight-navy); font-weight: 600; }

  /* Page header (non-home pages) */
  .page-hero {
    background: var(--gradient-premium-dark);
    color: var(--color-cloud-white);
    padding: 200px 56px 100px;
    border-bottom: 1px solid var(--color-navy-line);
  }
</style>
</head>
